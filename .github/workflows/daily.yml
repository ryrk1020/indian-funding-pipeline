name: Daily scrape + enrich + export

on:
  schedule:
    # 02:00 UTC = 07:30 IST. Runs once per day.
    - cron: "0 2 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'openai/gpt-oss-120b:free' }}
      OPENROUTER_FALLBACK_MODELS: ${{ vars.OPENROUTER_FALLBACK_MODELS || 'openai/gpt-oss-120b:free,mistralai/mistral-7b-instruct:free,meta-llama/llama-3.1-8b-instruct:free,qwen/qwen-2.5-7b-instruct:free' }}
      PIPELINE_LOG_LEVEL: INFO
      PYTHONIOENCODING: utf-8

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install Playwright chromium
        run: python -m playwright install --with-deps chromium

      - name: Scrape sources
        run: python -m pipeline.run scrape

      - name: Enrich pending articles
        run: python -m pipeline.run enrich --limit 50

      - name: Export CSV + JSON + XLSX
        run: python -m pipeline.run export --format all

      - name: Report health
        run: python -m pipeline.run health || true

      - name: Upload exports as artifact
        uses: actions/upload-artifact@v4
        with:
          name: exports-${{ github.run_id }}
          path: data/exports/
          retention-days: 30

      - name: Commit refreshed sample exports
        run: |
          cp data/exports/rounds_*.csv  exports/sample_rounds.csv  2>/dev/null || true
          cp data/exports/rounds_*.json exports/sample_rounds.json 2>/dev/null || true
          if [ -n "$(git status --porcelain exports/)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add exports/
            git commit -m "chore(exports): refresh sample exports [skip ci]"
            git push
          else
            echo "No export changes to commit."
          fi
